<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플렉스 박스 레이아웃</title>

    <style>
        .container{
            width: 800px;
            height: 100px;
            display: flex;
            border: 1px solid #222;
            gap: 10px;
        }
        .box{
            flex-basis: 150px;
        }
        .box:nth-child(odd){
            background-color: #ffc400;
        }
        .box:nth-child(even){
            background-color: #a6ff00;
        }
        p{
            font-weight: bold;
            text-align: center;
        }
        #box1{
            flex-grow: 1;
        }
        #box2{
            flex-grow: 2;
        }
        #box4{
            flex-grow: 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box1">1</div>
        <div class="box" id="box2">2</div>
        <div class="box" id="box3">3</div>
        <div class="box" id="box4">4</div>
    </div>
</body>
</html>
