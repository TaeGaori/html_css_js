<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>트랜지션 - rotate 함수</title>
</head>

    <style>
        #container{
            width: 800px;
            margin: 20px auto;
        }
        .origin{
            float: left;
            margin: 40px;
            border: 1px solid #ccc;
        }
        .rotatex:hover{
            transform: rotateX(50deg);
        }
        #pers{
            perspective: 300px;
        }

    </style>
<body>
    <div class="container">
        <div class="origin">
            <div class="rotatex"><img src="/images/home.png"></div>
        </div>
        <div class="origin rotatex" id="pers">
            <div class="rotatex"><img src="/images/home.png"></div>
        </div>
    </div>
</body>
</html>
