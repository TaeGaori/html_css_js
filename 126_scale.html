<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>트랜지션 - translate 함수</title>
</head>

    <style>
        .container{
            width: 800px;
            height: 200px;
            margin: 20px auto;
        }
        .origin{
            width: 100px;
            height: 100px;
            border: 1px solid black;
            margin: 40px;
            float: left;
        }
        .origin > div {
            width: 100px;
            height: 100px;
            background-color: orange;
            transition: 1s;
        }
        #scaleX:hover{
            transform: scaleX(2);
        }
        #scaleY:hover{
            transform: scaleY(1.5);
        }
        #scale:hover{
            transform: scale(0.7);
        }
    </style>
<body>
    <div class="container">
        <div class="origin">
            <div id="scaleX"></div>
        </div>
        <div class="origin">
            <div id="scaleY"></div>
        </div>
        <div class="origin">
            <div id="scale"></div>
        </div>
    </div>
</body>
</html>
