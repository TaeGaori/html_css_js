<!DOCTYPE html>
<html lang="ko">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스 모델 - 마진</title>

            box-sizing: border-box;
        }
        div{
            width: 200px;
            height: 100px;
            margin: 30px;
        }
        #margin1{
            background: rgb(184, 14, 127);
        }
        #margin2{
            background: rgb(89, 27, 148);
        }
        #margin3{
            background: rgb(64, 183, 199);
        }
    </style>
</head>
<body>
    <div id="margin1"></div>
    <div id="margin2"></div>
    <div id="margin3"></div>
</body>
</html>
