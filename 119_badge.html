<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가상 요소</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        .icon {
            width: 200px;
            height: 200px;
            position: relative;
        }
        .icon i::after{
            content: "4";
            font-size: 30px;
            text-align: center;
            background-color: red;
            color: white;
            border-radius: 50%;
            position: absolute;
            top: 20px;
            right: 40px;
        }
    </style>
</head>
<body>
    <div class="icon">
        <i class="fa-solid fa-bell fa-10x"></i>
    </div>
</body>
</html>
