<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            background-color: #02233b;
        }
        #container{
            background: #fff url(/images/mic.png) no-repeat right bottom;
            width: 600px;
            height: 700px;
            margin: 0 auto;
            padding: 20px;
            border: 1px dotted gray;
        }
        h1{
            text-align: center;
            background-color: #004344;
            color: white;
            padding: 15px;
        }
        h2{
            text-align: center;
            font-style: italic;
            margin-bottom: 60px;
        }
        h4{
            color: red;
        }
        ul{
            list-style-type: none;
        }
        li{
            line-height: 30px;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1><b>대학언론사 수습기자 모집</b></h1>
        <h2><em>신입생 여러분을 기다립니다</em></h2>
        <h4>모집분야</h4>
        <ul>
            <li>아나운서(0명): 학내 소식을 라디오 방송으로 보도</li>
            <li>오프닝쇼프로듀서(0명): 라디오 방송 기획, 제작</li>
            <li>엔지니어(0명): 라디오 방송 녹음 및 편집</li>
        </ul>
            <h4>혜택</h4>
        <ul>
            <li>수습기자 활동 중 소정의 활동비 지급</li>
            <li>정기자로 진급하면 장학금 지급</li>
        </ul>
    </div>
</body>
</html>
