<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>488p 연습문제</title>

    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        table{
            border-collapse: collapse;
            width: 200px;
        }
        table td{
            border: 1px solid #000;
            padding: 8px;
        }
        tr:nth-child(odd) td{
            background-color: gray;
        }
        caption{
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }

    </style>
</head>
<body>
    <div class="container">
        <table>
            <caption>웹 개발</caption>
            <tr>
                <td>HTML</td>
            </tr>
            <tr>
                <td>CSS</td>
            </tr>
            <tr>
                <td>Javascript</td>
            </tr>  
            <tr>
                <td>Node.js</td>
            </tr>
            <tr>
                <td>Typescript</td>
            </tr>
        </table>
    </div>
</div>
</body>
</html>
