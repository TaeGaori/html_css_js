<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
            margin: 0;
        }
        .container{
            width: 600px;
            height: 500px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 1rem;
        }
        .box{
            padding: 20px;
            color: black;
            text-align: center;
        }
        .box1{
            background-color: yellow;
            grid-column: 1/3;
            grid-row: 1/3;
        }
        .box2{
            background-color: yellow;
            grid-column: 3/5;
            grid-row: 1;
        }
        .box3{
            background-color: yellow;
            grid-column: 3;
            grid-row: 2/4;
        }
        .box4{
            background-color: yellow;
            grid-column: 4;
            grid-row: 2/4;
        }
        .box5{
            background-color: yellow;
            grid-column: 1/3;
            grid-row: 3;
        }
    </style>
<body>
    <div class="container">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
        <div class="box box4">4</div>
        <div class="box box5">5</div>
    </div>
</body>
</html>
